<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Valdes</title>
  </head>
  <body class="bg-[#050505] h-[100dvh] w-full overflow-hidden flex justify-center items-center relative font-mono selection:bg-white selection:text-black antialiased">
    
    <!-- Mobile Smartphone Container (Terminal Shell) -->
    <div id="app" class="z-10 w-full h-[100dvh] max-w-[400px] sm:h-[800px] sm:max-h-[90dvh] mx-auto sm:rounded-none bg-black border border-[#222] shadow-[0_0_30px_rgba(255,255,255,0.02)] flex flex-col relative overflow-hidden">
      
      <!-- SCREEN: AUTH -->
      <div id="screen-auth" class="flex flex-col h-full w-full items-center justify-center p-6 bg-[#0a0a0a]">
        <div class="mb-10 text-center">
          <h1 class="text-white font-bold text-xl tracking-[0.3em] uppercase mb-2">> VALDES_PROTOCOL</h1>
          <p class="text-[#1c6a2e] text-xs uppercase tracking-widest">// ZERO-KNOWLEDGE E2EE // STANDBY</p>
        </div>
        
        <form id="auth-form" class="w-full flex flex-col gap-4">
          <div class="flex flex-col gap-1">
            <label class="text-gray-500 text-[10px] uppercase tracking-widest">Key 1 (Private Auth Key)</label>
            <input type="password" id="input-private-key" class="w-full bg-[#101010] border border-[#222] focus:border-[#444] text-gray-200 p-3 text-[13px] outline-none rounded-none transition-colors placeholder:text-gray-600 leading-relaxed" placeholder="> Insert Private Auth Key..." autocomplete="off" />
          </div>
          <button type="submit" class="w-full mt-4 py-3 rounded-none border border-[#333] hover:border-white text-gray-400 hover:text-white font-bold text-xs tracking-[0.2em] transition-colors bg-[#0a0a0a] uppercase active:bg-white active:text-black">
            [ INITIALIZE ]
          </button>
        </form>
        
        <div class="mt-12 pt-6 border-t border-[#222] w-full text-center">
          <button type="button" class="text-gray-500 hover:text-white text-[10px] uppercase tracking-widest transition-colors duration-200">
            >> GENERATE NEW KEY PAIR
          </button>
        </div>
      </div>

      <!-- SCREEN: CHAT LIST -->
      <div id="screen-chat-list" class="hidden flex flex-col h-full w-full bg-[#0a0a0a]">
        <!-- Terminal Header (Profile) -->
        <div class="bg-[#101010] border-b border-[#222] p-4 flex flex-row items-center gap-4 shrink-0 relative z-20">
          <div class="w-10 h-10 border border-[#333] bg-[#0a0a0a] flex items-center justify-center shrink-0">
             <span class="text-[10px] font-bold text-white uppercase tracking-widest opacity-80">V</span>
          </div>
          <div class="flex flex-col flex-1 min-w-0 justify-center">
             <h1 class="text-[14px] font-bold text-white truncate tracking-wider uppercase">12345...</h1>
             <span class="text-[10px] text-gray-500 truncate mt-1 tracking-widest uppercase">STATUS: ONLINE</span>
          </div>
          <div class="flex shrink-0">
             <button id="btn-copy-k1" class="text-xs text-gray-500 border border-[#333] px-2 py-1 hover:text-white hover:border-white transition-all ml-2">[ COPY K1 ]</button>
             <button id="btn-copy-k2" class="text-xs text-gray-500 border border-[#333] px-2 py-1 hover:text-white hover:border-white transition-all ml-1">[ COPY K2 ]</button>
          </div>
        </div>

        <!-- Top Action Bar -->
        <form id="new-chat-form" class="p-4 border-b border-[#222] shrink-0 bg-[#0a0a0a] flex flex-row items-stretch gap-2">
           <div class="flex-1 flex">
              <input type="text" id="input-public-key" class="w-full bg-[#111] border border-[#333] focus:border-gray-500 text-gray-200 px-3 py-2 text-[12px] outline-none rounded-none transition-colors placeholder:text-gray-600" placeholder="Search or enter Key 2..." autocomplete="off"/>
           </div>
           <button type="submit" class="w-10 h-10 border border-[#333] hover:border-gray-500 text-gray-400 hover:text-white font-mono text-[14px] transition-colors bg-[#111] flex items-center justify-center shrink-0">
              [+]
           </button>
        </form>

        <!-- Section Header -->
        <div class="px-4 py-3 shrink-0">
           <span class="text-xs text-gray-500 uppercase tracking-widest">CONTACTS</span>
        </div>

        <!-- List Area -->
        <div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col w-full">
           <!-- Mock Chat Item 1 (Active) -->
           <button type="button" class="group w-full flex items-center px-4 py-3 border-b border-[#222] bg-[#1a1a1a] hover:bg-[#222] transition-colors outline-none cursor-pointer">
              <div class="flex items-center gap-3">
                 <div class="w-1.5 h-1.5 rounded-full bg-white shadow-[0_0_4px_rgba(255,255,255,0.8)]"></div>
                 <span class="text-[13px] font-mono text-gray-200 tracking-wider">RX0</span>
              </div>
           </button>

           <!-- Mock Chat Item 2 -->
           <button type="button" class="group w-full flex items-center px-4 py-3 border-b border-[#222] bg-transparent hover:bg-[#111] transition-colors outline-none cursor-pointer">
              <div class="flex items-center gap-3">
                 <div class="w-1.5 h-1.5 rounded-full border border-gray-500 bg-transparent flex-shrink-0 ml-[1px]"></div>
                 <span class="text-[13px] font-mono text-gray-400 group-hover:text-gray-200 tracking-wider transition-colors ml-[1px]">NODE47</span>
              </div>
           </button>

           <!-- Mock Chat Item 3 -->
           <button type="button" class="group w-full flex items-center px-4 py-3 border-b border-[#222] bg-transparent hover:bg-[#111] transition-colors outline-none cursor-pointer">
              <div class="flex items-center gap-3">
                 <div class="w-1.5 h-1.5 rounded-full border border-gray-500 bg-transparent flex-shrink-0 ml-[1px]"></div>
                 <span class="text-[13px] font-mono text-gray-400 group-hover:text-gray-200 tracking-wider transition-colors ml-[1px]">KZZZ0103</span>
              </div>
           </button>
        </div>

        <!-- Bottom Action Bar / Logout -->
        <div class="p-4 border-t border-[#222] shrink-0 bg-[#0a0a0a] flex justify-end">
           <button id="btn-logout" type="button" class="text-[10px] font-mono text-gray-500 hover:text-[#ef4444] uppercase tracking-[0.2em] transition-colors outline-none">
              [ LOGOUT ]
           </button>
        </div>
      </div>

      <!-- SCREEN: CHAT -->
      <div id="screen-chat" class="hidden flex flex-col h-full w-full">
        <!-- Terminal Header -->
        <div class="bg-[#101010] border-b border-[#222] p-4 flex flex-row items-center gap-4 shrink-0 relative z-20">
          <!-- Back button -->
          <button id="btn-back-to-list" class="text-gray-500 hover:text-white transition-colors shrink-0 mr-2 flex items-center justify-center">
             <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          
          <!-- Minimal Avatar -->
          <div class="w-10 h-10 border border-[#333] bg-[#0a0a0a] flex items-center justify-center shrink-0">
             <span class="text-[10px] font-bold text-white uppercase tracking-widest opacity-80">V</span>
          </div>
          <div class="flex flex-col flex-1 min-w-0 justify-center">
             <h1 class="text-[14px] font-bold text-white truncate tracking-wider uppercase">ABCDE...</h1>
             <span class="text-[10px] text-gray-500 truncate mt-1 tracking-widest uppercase">STATUS: ONLINE</span>
          </div>
          <div class="flex shrink-0">
             <button id="btn-copy-peer-k2" class="text-xs text-gray-500 border border-[#333] px-2 py-1 hover:text-white hover:border-white transition-all ml-2">[ COPY ]</button>
          </div>
        </div>

        <!-- Main Layout (Chat) -->
        <div class="flex-1 flex flex-col min-w-0 h-full overflow-hidden z-20">
          
          <!-- Chat History -->
          <div id="chat-container" class="flex-1 bg-[#0a0a0a] text-gray-300 p-4 pb-2 overflow-y-auto custom-scrollbar flex flex-col font-mono mb-0 break-words">
             <div class="text-[10px] text-gray-600 mb-6 border-b border-[#222] pb-2 flex items-center justify-between uppercase tracking-widest">
                <span class="text-[#1c6a2e]">// Valdes E2EE Active</span>
                <span id="clock" class="text-gray-600"></span>
             </div>
             <!-- message elements append here -->
          </div>

          <!-- Input Area -->
          <div class="px-4 pb-4 pt-2 shrink-0 bg-[#0a0a0a] border-t border-[#222]">
            <form id="chat-form" class="bg-transparent flex flex-col shrink-0 p-0 outline-none">
              <textarea id="message-input" autocomplete="off" class="w-full resize-none p-3 text-[13px] text-gray-200 focus:outline-none bg-[#101010] m-0 custom-scrollbar h-[60px] border border-[#222] focus:border-[#444] transition-colors rounded-none leading-relaxed" placeholder="> Type message..." autofocus></textarea>
              <button type="submit" class="w-full mt-3 py-2.5 rounded-none border border-[#333] hover:border-white text-gray-400 hover:text-white font-bold text-xs tracking-[0.2em] transition-colors shrink-0 bg-[#0a0a0a] uppercase active:bg-white active:text-black">
                 [ SEND ]
              </button>
            </form>
          </div>

        </div>
      </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
